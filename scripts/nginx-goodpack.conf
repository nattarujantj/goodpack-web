server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # Entry-point files — must never be cached so every deploy is picked up immediately.
    # This is the nginx equivalent of the Netlify _headers file.
    location ~* ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|manifest\.json|main\.dart\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed/versioned assets (Flutter adds content hashes to filenames) — safe to cache long-term.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unmatched routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
