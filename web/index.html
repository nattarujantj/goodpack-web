<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!--
    interactive-widget=resizes-content (Chrome 108+):
    Forces Android to shrink the layout viewport when the virtual keyboard
    appears, so Flutter fills the screen correctly after keyboard dismissal.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">

  <!-- Prevent browser caching of index.html -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_app</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /*
      100dvh = dynamic viewport height that shrinks/grows with browser UI.
      Prevents Flutter canvas from being taller than the visible area,
      which causes the white gap at the bottom on Android.
    */
    html {
      height: 100%;
    }
    body {
      height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    /*
     * Fallback for Android Chrome < 108 (no interactive-widget support).
     *
     * Flutter Web listens to window "resize" to re-measure its canvas.
     * When the virtual keyboard opens or closes, only visualViewport fires
     * — NOT window resize — so we bridge the two here.
     * This makes Flutter recalculate canvas height and removes the white gap.
     */
    (function () {
      if (!window.visualViewport) return;
      window.visualViewport.addEventListener('resize', function () {
        window.dispatchEvent(new Event('resize'));
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
