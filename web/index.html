<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Prevent browser caching of index.html -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="flutter_app">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_app</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    /*
     * Bridge visualViewport resize → window resize so Flutter recalculates
     * viewInsets.bottom (keyboard height) correctly.
     *
     * Using requestAnimationFrame defers the event until after the browser
     * has committed the new viewport dimensions, preventing Flutter from
     * reading a stale window.innerHeight.
     *
     * The focusout fallback catches cases where visualViewport.resize does
     * not fire reliably on some Android Chrome versions.
     */
    (function () {
      if (!window.visualViewport) return;
      function scheduleResize() {
        requestAnimationFrame(function () {
          window.dispatchEvent(new Event('resize'));
        });
      }
      window.visualViewport.addEventListener('resize', scheduleResize);
      document.addEventListener('focusout', scheduleResize);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Detect new service worker versions and reload automatically.
    // Flutter's SW supports the 'skip-waiting' message to force activation.
    if ('serviceWorker' in navigator) {
      var _swRefreshing = false;

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!_swRefreshing) {
          _swRefreshing = true;
          window.location.reload();
        }
      });

      function _handleNewSW(worker) {
        worker.addEventListener('statechange', function () {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) {
            // A new version is ready — tell it to skip waiting and take control.
            worker.postMessage('skip-waiting');
          }
        });
      }

      navigator.serviceWorker.ready.then(function (registration) {
        if (registration.waiting) {
          _handleNewSW(registration.waiting);
        }
        registration.addEventListener('updatefound', function () {
          _handleNewSW(registration.installing);
        });
      });

      // Re-check for SW updates every time the page comes back to foreground.
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (r) { r.update(); });
          });
        }
      });
    }
  </script>
</body>
</html>
